<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- App background -->
  <rect width="512" height="512" rx="110" fill="#4CAF88"/>
  <!-- Racket head -->
  <ellipse cx="248" cy="208" rx="128" ry="152" fill="white"/>
  <!-- String grid -->
  <line x1="158" y1="168" x2="338" y2="168" stroke="#4CAF88" stroke-width="8" opacity="0.35"/>
  <line x1="148" y1="208" x2="348" y2="208" stroke="#4CAF88" stroke-width="8" opacity="0.35"/>
  <line x1="158" y1="248" x2="338" y2="248" stroke="#4CAF88" stroke-width="8" opacity="0.35"/>
  <line x1="216" y1="60"  x2="216" y2="356" stroke="#4CAF88" stroke-width="8" opacity="0.35"/>
  <line x1="248" y1="56"  x2="248" y2="360" stroke="#4CAF88" stroke-width="8" opacity="0.35"/>
  <line x1="280" y1="60"  x2="280" y2="356" stroke="#4CAF88" stroke-width="8" opacity="0.35"/>
  <!-- Handle shaft -->
  <rect x="222" y="356" width="52" height="108" rx="18" fill="white"/>
