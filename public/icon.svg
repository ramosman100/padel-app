  <line x1="226" y1="386" x2="270" y2="386" stroke="#4CAF88" stroke-width="5" opacity="0.4" stroke-linecap="round"/>
  <line x1="226" y1="406" x2="270" y2="406" stroke="#4CAF88" stroke-width="5" opacity="0.4" stroke-linecap="round"/>
  <line x1="226" y1="426" x2="270" y2="426" stroke="#4CAF88" stroke-width="5" opacity="0.4" stroke-linecap="round"/>
  <!-- Tennis ball -->
  <circle cx="382" cy="372" r="56" fill="#D4E800"/>
  <path d="M338 338 Q382 316 426 338" stroke="white" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M338 406 Q382 428 426 406" stroke="white" stroke-width="8" fill="none" stroke-linecap="round"/>
</svg>
